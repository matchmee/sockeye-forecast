name: Daily sockeye forecast

# Runs in GitHub's cloud - your own computer does NOT need to be on.
on:
  schedule:
    # Runs at the top of every hour (UTC). ADF&G's posting time varies, so hourly
    # ensures the page refreshes soon after new counts appear. Public-repo Actions
    # minutes are free, so this costs nothing.
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run forecast (fetches ADF&G data live)
        run: |
          python forecast.py
          mkdir -p public
          mv index.html public/index.html
          mv forecast.json public/forecast.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deploy
        uses: actions/deploy-pages@v4
